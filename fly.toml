app = "n8n-fbcp-w"
primary_region = "fra"

[env]
N8N_HOST = "n8n-fbcp-w.fly.dev"
N8N_PROTOCOL = "https"
WEBHOOK_URL = "https://n8n-fbcp-w.fly.dev"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[[mounts]]
destination = "/home/node/.n8n"
source = "n8n_data"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1_024
