app = "n8n-fbcp-w"
primary_region = "fra"

[env]
  WEBHOOK_URL = "https://n8n-fbcp-w.fly.dev"
  N8N_HOST = "n8n-fbcp-w.fly.dev"
  N8N_PROTOCOL = "https"
  N8N_PORT = "8080"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "n8n_data"
  destination = "/home/node/.n8n"
