# fly.toml app configuration file generated for n8n-fbcp-w on 2026-06-08T13:56:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'n8n-fbcp-w'
primary_region = 'fra'

[build]

[env]
  N8N_HOST = 'n8n-fbcp-w.fly.dev'
  N8N_PROTOCOL = 'https'
  WEBHOOK_URL = 'https://n8n-fbcp-w.fly.dev'

[[mounts]]
  source = 'n8n_data'
  destination = '/home/node/.n8n'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
